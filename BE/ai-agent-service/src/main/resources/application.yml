server:
  port: ${SERVER_PORT:8085}

spring:
  application:
    name: ai-agent-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ai_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never

# Qdrant Configuration
qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6333}

# Neo4j Configuration
neo4j:
  uri: ${NEO4J_URI:bolt://localhost:7687}
  username: ${NEO4J_USERNAME:neo4j}
  password: ${NEO4J_PASSWORD:password}

# LLM Configuration
llm:
  api-key: ${LLM_API_KEY}
  model: gpt-4o-mini
  max-tokens: 4096
  temperature: 0.7

# Internal Security
internal:
  token: ${X_INTERNAL_TOKEN:sm-secret-internal-service-token-key-2026}

# Service URLs
product-service:
  url: ${PRODUCT_SERVICE_URL:http://localhost:8083}
inventory-service:
  url: ${INVENTORY_SERVICE_URL:http://localhost:8084}
order-service:
  url: ${ORDER_SERVICE_URL:http://localhost:8087}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.stylemind.ai: DEBUG
    com.stylemind.ai.feign: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{X-Request-Id:-}] [%thread] %-5level %logger{36} - %msg%n"