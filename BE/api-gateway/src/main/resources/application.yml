server:
  port: 3001

spring:
  application:
    name: api-gateway
  main:
    allow-bean-definition-overriding: true
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: '*'
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: '*'
            exposedHeaders: 'X-Request-Id,X-User-Id,X-User-Roles'
            allowCredentials: false
      # Strip duplicate CORS headers that downstream services add on top of gateway's own headers.
      # Without this, browser sees two Access-Control-Allow-Origin values and blocks the response.
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin, RETAIN_FIRST
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: ${USER_SERVICE_URL:http://user-service:8082}
          predicates:
            - Path=/api/users/**
        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://product-service:8083}
          predicates:
            - Path=/api/products/**
        - id: category-service
          uri: ${PRODUCT_SERVICE_URL:http://product-service:8083}
          predicates:
            - Path=/api/categories/**
        - id: cart-service
          uri: ${CART_SERVICE_URL:http://cart-service:8086}
          predicates:
            - Path=/api/cart/**
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://order-service:8087}
          predicates:
            - Path=/api/orders/**
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://payment-service:8088}
          predicates:
            - Path=/api/payment/**
        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://notification-service:8089}
          predicates:
            - Path=/api/notifications/**
        - id: admin-notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://notification-service:8089}
          predicates:
            - Path=/api/admin/notifications/**
        - id: ai-service
          uri: ${AI_SERVICE_URL:http://ai-agent-service:8085}
          predicates:
            - Path=/api/ai-stylist/**
        - id: admin-ai-service
          uri: ${AI_SERVICE_URL:http://ai-agent-service:8085}
          predicates:
            - Path=/api/admin/ai/**
        - id: admin-users-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/api/admin/users/**
        - id: internal-block
          uri: no://op
          predicates:
            - Path=/internal/**
          filters:
            - SetStatus=401

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.stylemind.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{X-Request-Id:-}] [%thread] %-5level %logger{36} - %msg%n'
