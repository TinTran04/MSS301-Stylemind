server:
  port: ${SERVER_PORT:8081}

spring:
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: true
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never

jwt:
  secret: ${JWT_SECRET:super-secure-stylemind-secret-key-signature-2026-xyz}
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.stylemind.auth: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{X-Request-Id:-}] [%thread] %-5level %logger{36} - %msg%n"

notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8089}

app:
  frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
  auth:
    setup-token-expiry-minutes: ${AUTH_SETUP_TOKEN_EXPIRY_MINUTES:1440}
    reset-otp-expiry-minutes: ${AUTH_RESET_OTP_EXPIRY_MINUTES:10}
    reset-token-expiry-minutes: ${AUTH_RESET_TOKEN_EXPIRY_MINUTES:30}
    reset-otp-max-attempts: ${AUTH_RESET_OTP_MAX_ATTEMPTS:5}
    reset-otp-resend-cooldown-seconds: ${AUTH_RESET_OTP_RESEND_COOLDOWN_SECONDS:60}

feign:
  client:
    config:
      notification-internal-client:
        connectTimeout: 3000
        readTimeout: 5000
