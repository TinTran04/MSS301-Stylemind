server:
  port: ${SERVER_PORT:8081}

spring:
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: true
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true

jwt:
  secret: ${JWT_SECRET:change-me-local-jwt-secret-at-least-32-characters}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

auth:
  password:
    min-length: ${AUTH_PASSWORD_MIN_LENGTH:8}
  email-verification:
    required: ${AUTH_EMAIL_VERIFICATION_REQUIRED:true}
    token-expiration-ms: ${AUTH_EMAIL_VERIFICATION_TOKEN_EXPIRATION_MS:86400000}
  password-reset:
    token-expiration-ms: ${AUTH_PASSWORD_RESET_TOKEN_EXPIRATION_MS:900000}
  refresh-token:
    cookie-name: ${AUTH_REFRESH_TOKEN_COOKIE_NAME:refresh_token}
    cookie-secure: ${AUTH_REFRESH_TOKEN_COOKIE_SECURE:false}
    cookie-domain: ${AUTH_REFRESH_TOKEN_COOKIE_DOMAIN:}
  outbox:
    publisher:
      enabled: ${AUTH_OUTBOX_PUBLISHER_ENABLED:true}
      batch-size: ${AUTH_OUTBOX_PUBLISHER_BATCH_SIZE:20}
      fixed-delay-ms: ${AUTH_OUTBOX_PUBLISHER_FIXED_DELAY_MS:5000}
      initial-delay-ms: ${AUTH_OUTBOX_PUBLISHER_INITIAL_DELAY_MS:5000}
      confirm-timeout-ms: ${AUTH_OUTBOX_CONFIRM_TIMEOUT_MS:5000}

app:
  rabbitmq:
    exchange: ${RABBITMQ_EVENTS_EXCHANGE:stylemind.events}
    dlx: ${RABBITMQ_EVENTS_DLX:stylemind.events.dlx}
    user-registered:
      routing-key: ${RABBITMQ_USER_REGISTERED_ROUTING_KEY:user.registered}
      queue: ${RABBITMQ_USER_REGISTERED_QUEUE:user-profile.user-registered}
      dlq: ${RABBITMQ_USER_REGISTERED_DLQ:user-profile.user-registered.dlq}
      dlq-routing-key: ${RABBITMQ_USER_REGISTERED_DLQ_ROUTING_KEY:user.registered.dlq}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    com.stylemind.auth: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{X-Request-Id:-}] [%thread] %-5level %logger{36} - %msg%n"
