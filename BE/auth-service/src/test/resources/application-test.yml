spring:
  datasource:
    url: jdbc:h2:mem:auth_service_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

auth:
  email-verification:
    token-expiration-ms: 86400000
  password-reset:
    token-expiration-ms: 900000
  outbox:
    publisher:
      enabled: false
