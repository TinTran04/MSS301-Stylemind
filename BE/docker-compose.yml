services:
  # ----------------------------------------------------
  # Public entrypoint
  # ----------------------------------------------------
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    image: stylemind/api-gateway:local
    container_name: stylemind-api-gateway
    ports:
      - "${API_GATEWAY_PORT:-3000}:3000"
    environment:
      SERVER_PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change-me-local-jwt-secret-at-least-32-characters}
      JWT_KEY_PATH: ${JWT_KEY_PATH:-}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-change-me-local-internal-secret}
      INTERNAL_TOKEN: ${INTERNAL_SERVICE_SECRET:-change-me-local-internal-secret}
      REDIS_URL: redis://redis:6379
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-stylemind}:${RABBITMQ_PASSWORD:-stylemind}@rabbitmq:5672/${RABBITMQ_VHOST:-stylemind}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-stylemind}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-stylemind}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VHOST:-stylemind}
      AUTH_SERVICE_URL: http://auth-service:8081
      USER_PROFILE_SERVICE_URL: http://user-profile-service:8082
      USER_SERVICE_URL: http://user-profile-service:8082
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_started
      user-profile-service:
        condition: service_started
    networks:
      - stylemind-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/actuator/health || wget -qO- http://localhost:3000/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ----------------------------------------------------
  # Internal services
  # ----------------------------------------------------
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    image: stylemind/auth-service:local
    container_name: stylemind-auth-service
    expose:
      - "8081"
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: ${AUTH_DB_USER:-auth_user}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_DB_PASSWORD:-auth_password}
      DATABASE_URL: jdbc:postgresql://auth-postgres:5432/auth_db
      REDIS_URL: redis://redis:6379
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-stylemind}:${RABBITMQ_PASSWORD:-stylemind}@rabbitmq:5672/${RABBITMQ_VHOST:-stylemind}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-stylemind}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-stylemind}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VHOST:-stylemind}
      JWT_SECRET: ${JWT_SECRET:-change-me-local-jwt-secret-at-least-32-characters}
      JWT_KEY_PATH: ${JWT_KEY_PATH:-}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-change-me-local-internal-secret}
      INTERNAL_TOKEN: ${INTERNAL_SERVICE_SECRET:-change-me-local-internal-secret}
      SPRING_MAIN_ALLOW_CIRCULAR_REFERENCES: "true"
    depends_on:
      auth-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - stylemind-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/actuator/health || wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 60s

  user-profile-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    image: stylemind/user-profile-service:local
    container_name: stylemind-user-profile-service
    expose:
      - "8082"
    environment:
      SERVER_PORT: 8082
      SPRING_APPLICATION_NAME: user-profile-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-profile-postgres:5432/user_profile_db
      SPRING_DATASOURCE_USERNAME: ${USER_PROFILE_DB_USER:-user_profile_user}
      SPRING_DATASOURCE_PASSWORD: ${USER_PROFILE_DB_PASSWORD:-user_profile_password}
      DATABASE_URL: jdbc:postgresql://user-profile-postgres:5432/user_profile_db
      REDIS_URL: redis://redis:6379
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-stylemind}:${RABBITMQ_PASSWORD:-stylemind}@rabbitmq:5672/${RABBITMQ_VHOST:-stylemind}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-stylemind}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-stylemind}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VHOST:-stylemind}
      JWT_SECRET: ${JWT_SECRET:-change-me-local-jwt-secret-at-least-32-characters}
      JWT_KEY_PATH: ${JWT_KEY_PATH:-}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:-change-me-local-internal-secret}
      INTERNAL_TOKEN: ${INTERNAL_SERVICE_SECRET:-change-me-local-internal-secret}
      AUTH_SERVICE_URL: http://auth-service:8081
    depends_on:
      user-profile-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - stylemind-internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/actuator/health || wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ----------------------------------------------------
  # Internal infrastructure
  # ----------------------------------------------------
  auth-postgres:
    image: postgres:15-alpine
    container_name: stylemind-auth-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${AUTH_DB_USER:-auth_user}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-auth_password}
    volumes:
      - auth_pgdata:/var/lib/postgresql/data
      - ./init-scripts/01-auth-db.sql:/docker-entrypoint-initdb.d/01-auth-db.sql:ro
    networks:
      - stylemind-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER:-auth_user} -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  user-profile-postgres:
    image: postgres:15-alpine
    container_name: stylemind-user-profile-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_DB: user_profile_db
      POSTGRES_USER: ${USER_PROFILE_DB_USER:-user_profile_user}
      POSTGRES_PASSWORD: ${USER_PROFILE_DB_PASSWORD:-user_profile_password}
    volumes:
      - user_profile_pgdata:/var/lib/postgresql/data
      - ./init-scripts/02-user-db.sql:/docker-entrypoint-initdb.d/01-user-profile-db.sql:ro
    networks:
      - stylemind-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_PROFILE_DB_USER:-user_profile_user} -d user_profile_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: stylemind-rabbitmq
    expose:
      - "5672"
      - "15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-stylemind}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-stylemind}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-stylemind}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - stylemind-internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: stylemind-redis
    expose:
      - "6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - stylemind-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  stylemind-internal:
    driver: bridge

volumes:
  auth_pgdata:
  user_profile_pgdata:
  rabbitmq_data:
  redis_data:
