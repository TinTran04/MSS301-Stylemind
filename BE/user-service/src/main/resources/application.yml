server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/user_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/{vendor}
    validate-on-migrate: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}
    listener:
      simple:
        acknowledge-mode: auto

jwt:
  secret: ${JWT_SECRET:change-me-local-jwt-secret-at-least-32-characters}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

app:
  rabbitmq:
    exchange: ${RABBITMQ_EVENTS_EXCHANGE:stylemind.events}
    dlx: ${RABBITMQ_EVENTS_DLX:stylemind.events.dlx}
    user-registered:
      routing-key: ${RABBITMQ_USER_REGISTERED_ROUTING_KEY:user.registered}
      queue: ${RABBITMQ_USER_REGISTERED_QUEUE:user-profile.user-registered}
      dlq: ${RABBITMQ_USER_REGISTERED_DLQ:user-profile.user-registered.dlq}
      dlq-routing-key: ${RABBITMQ_USER_REGISTERED_DLQ_ROUTING_KEY:user.registered.dlq}

user-profile:
  events:
    consumer:
      enabled: ${USER_PROFILE_EVENTS_CONSUMER_ENABLED:true}
      retry-attempts: ${USER_PROFILE_EVENTS_RETRY_ATTEMPTS:3}
      retry-initial-interval-ms: ${USER_PROFILE_EVENTS_RETRY_INITIAL_INTERVAL_MS:1000}
      retry-multiplier: ${USER_PROFILE_EVENTS_RETRY_MULTIPLIER:2.0}
      retry-max-interval-ms: ${USER_PROFILE_EVENTS_RETRY_MAX_INTERVAL_MS:10000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.stylemind.user: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{X-Request-Id:-}] [%thread] %-5level %logger{36} - %msg%n"
